services:
  - type: web
    name: darktracex
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: MODEL_PROVIDER
        value: ollama
      - key: OFFLINE_MODE
        value: "0"
